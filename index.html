<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homiee 料金計算・領収書発行</title>
    <style>
        /* --- 画面表示用スタイル（iPad/スマホ最適化） --- */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.5; padding: 20px; background-color: #f0f4f8; color: #333; -webkit-text-size-adjust: 100%; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h1 { font-size: 1.2rem; text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }
        .datetime-group { display: flex; gap: 8px; }
        
        /* 入力欄を指でタップしやすいサイズに */
        input[type="date"], input[type="time"], input[type="number"] { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; appearance: none; -webkit-appearance: none; 
        }
        
        .option-box, .discount-box { background: #fff9f0; padding: 15px; border-radius: 10px; border: 1px solid #fbd38d; margin-bottom: 15px; }
        .discount-box { background: #e8f4fd; border-color: #b3d7f2; }
        
        /* チェックボックスを大きく */
        .option-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 1rem; cursor: pointer; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; cursor: pointer; }

        .result-box { margin-top: 15px; padding: 20px; background: #fff5f5; border-radius: 10px; border: 1px solid #feb2b2; text-align: center; }
        .total-row { font-size: 2rem; font-weight: bold; color: #e53e3e; margin-bottom: 5px; }
        .detail { font-size: 0.9rem; color: #4a5568; }
        
        .print-btn { width: 100%; padding: 16px; background: #2c3e50; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; -webkit-tap-highlight-color: transparent; }
        .print-btn:active { background: #1a252f; }
        
        /* --- 印刷エリア非表示 --- */
        #print-area { display: none; }

        /* --- 🖨️ 印刷用設定 (A5 縦向き) --- */
        @media print {

  @page {
    size: A5 portrait;
    margin: 5mm;
  }

  body {
    background: white;
    padding: 0;
    margin: 0;
    color: #000;
  }

  .container,
  .print-btn {
    display: none !important;
  }

  /* 印刷エリア */

  #print-area {
    display: block !important;

    /* A5サイズ固定 */
    width: 148mm;

    /* Safariフッター回避 */
    height: 185mm;

    overflow: hidden;

    font-size: 11pt;
  }

  .header-info {
    text-align: center;
    margin-bottom: 10px;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
  }

  .header-title {
    font-size: 18pt;
    font-weight: bold;
  }

  .date-row {
    text-align: right;
    margin: 10px 0 20px 0;
  }

  .message {
    margin: 20px 0;
    line-height: 1.8;
  }

  .print-table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    border: 1px solid #000;
  }

  .print-table th,
  .print-table td {
    border: 1px solid #000;
    padding: 10px;
    text-align: left;
  }

  .total-section {
    font-size: 18pt;
    font-weight: bold;
    text-align: center;
    margin: 35px 0;
    border: 2px solid #000;
    padding: 15px;
  }

  .footer-info {
    text-align: right;
    margin-top: 40px;
    font-size: 10pt;
  }
}

        .sub-note { font-size: 0.82rem; color: #5f6b7a; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Homiee 料金計算機</h1>
    
    <div class="form-group">
        <label>入室日時</label>
        <div class="datetime-group">
            <input type="date" id="startDate" onchange="calculate()">
            <input type="time" id="startTime" value="10:00" onchange="calculate()">
        </div>
    </div>
    <div class="form-group">
        <label>退室日時</label>
        <div class="datetime-group">
            <input type="date" id="endDate" onchange="calculate()">
            <input type="time" id="endTime" value="12:16" onchange="calculate()">
        </div>
    </div>
    <div class="form-group">
        <label>お子様の人数</label>
        <input type="number" id="childCount" value="1" min="1" inputmode="numeric" onchange="calculate()">
    </div>

    <div class="option-box">
        <label>食事オプション</label>
        <label class="option-item"><input type="checkbox" class="meal-opt" value="550" onchange="calculate()"> 朝食 (¥550)</label>
        <label class="option-item"><input type="checkbox" class="meal-opt" value="880" onchange="calculate()"> 昼食 (¥880)</label>
        <label class="option-item"><input type="checkbox" class="meal-opt" value="880" onchange="calculate()"> 夕食 (¥880)</label>
    </div>

    <div class="discount-box">
        <label class="option-item" style="font-weight:bold; margin-bottom:0;">
            <input type="checkbox" id="isRepeater" onchange="calculate()">
            リピーター割引 (10%OFF)
        </label>
    </div>

    <div class="result-box">
        <div id="totalPrice" class="total-row">¥ 0</div>
        <div id="calcDetail" class="detail"></div>
    </div>

    <button class="print-btn" onclick="openPrintView()">領収書を印刷する (A5縦)</button>
    <div class="sub-note">印刷時は別画面で領収書のみを開きます。Safariのヘッダー表示を抑えやすくします。</div>
</div>

<div id="print-area">
    <div class="header-info"><div class="header-title">領収書兼ご精算書</div></div>
    <div class="date-row">日付：<span id="p-date"></span></div>
    <p class="message">この度はHomieeをご利用いただき、誠にありがとうございます。<br>下記内容にて、正に領収いたしました。</p>
    <table class="print-table">
        <thead>
            <tr><th style="width: 25%;">項目</th><th style="width: 50%;">詳細</th><th style="width: 25%;">金額</th></tr>
        </thead>
        <tbody>
            <tr><td>ご利用期間</td><td id="p-time-detail" style="font-size: 9pt;"></td><td>-</td></tr>
            <tr><td>ご利用時間</td><td id="p-duration"></td><td>-</td></tr>
            <tr><td>基本利用料</td><td>単価 × <span id="p-count"></span>名</td><td id="p-usage"></td></tr>
            <tr id="p-disc-row"><td>特別割引</td><td>リピーター割引(10%OFF)</td><td id="p-disc"></td></tr>
            <tr><td>オプション</td><td id="p-opt-list"></td><td id="p-opt"></td></tr>
        </tbody>
    </table>
    <div class="total-section">合計金額：<span id="p-total"></span> (税込)</div>
    <div class="footer-info">
        東京都中央区銀座7-15-18 銀ビル1階<br>
        TEL: 03-4400-2291<br>
        <strong>homiee (株式会社mommy daddy)</strong>
    </div>
</div>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById('startDate').value = today;
document.getElementById('endDate').value = today;

function calculate() {
    const sD = document.getElementById('startDate').value, sT = document.getElementById('startTime').value;
    const eD = document.getElementById('endDate').value, eT = document.getElementById('endTime').value;
    if(!sD || !sT || !eD || !eT) return;

    const startObj = new Date(`${sD}T${sT}`), endObj = new Date(`${eD}T${eT}`);
    let rawDiff = Math.floor((endObj - startObj) / (1000 * 60));
    if (rawDiff < 0) return;

    let amari = rawDiff % 30;
    let calcMin = amari <= 15 ? rawDiff - amari : rawDiff + (30 - amari);
    
    const base2h = 8800, add30m = 1650, childCount = parseInt(document.getElementById('childCount').value) || 1;
    let singlePrice = calcMin <= 120 ? base2h : base2h + ((calcMin - 120) / 30) * add30m;
    let totalUsage = singlePrice * childCount;

    let discount = 0;
    if (document.getElementById('isRepeater').checked) {
        discount = Math.floor((totalUsage * 0.1) / 10) * 10;
    }
    
    let optPrice = 0, optNames = [];
    document.querySelectorAll('.meal-opt:checked').forEach(opt => {
        optPrice += parseInt(opt.value);
        optNames.push(opt.parentElement.innerText.split('(')[0].trim());
    });
    let totalOpt = optPrice * childCount;
    let finalTotal = (totalUsage - discount) + totalOpt;

    document.getElementById('totalPrice').innerText = `¥ ${finalTotal.toLocaleString()}`;
    document.getElementById('calcDetail').innerHTML = `${Math.floor(calcMin/60)}時間 ${calcMin%60}分 / 合計: ¥${finalTotal.toLocaleString()}`;

    document.getElementById('p-date').innerText = eD.replace(/-/g, '/');
    document.getElementById('p-time-detail').innerText = `${sD.replace(/-/g, '/')} ${sT} ～ ${eD.replace(/-/g, '/')} ${eT}`;
    document.getElementById('p-duration').innerText = `${Math.floor(calcMin/60)}時間 ${calcMin%60}分`;
    document.getElementById('p-count').innerText = childCount;
    document.getElementById('p-usage').innerText = `¥${totalUsage.toLocaleString()}`;
    
    const discRow = document.getElementById('p-disc-row');
    discRow.style.display = discount > 0 ? 'table-row' : 'none';
    document.getElementById('p-disc').innerText = `-¥${discount.toLocaleString()}`;

    document.getElementById('p-opt-list').innerText = optNames.length > 0 ? optNames.join(', ') : 'なし';
    document.getElementById('p-opt').innerText = `¥${totalOpt.toLocaleString()}`;
    document.getElementById('p-total').innerText = `¥${finalTotal.toLocaleString()}`;
}

function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function buildPrintHtml() {
    const date = document.getElementById('p-date').innerText;
    const timeDetail = document.getElementById('p-time-detail').innerText;
    const duration = document.getElementById('p-duration').innerText;
    const count = document.getElementById('p-count').innerText;
    const usage = document.getElementById('p-usage').innerText;
    const discRow = document.getElementById('p-disc-row').style.display !== 'none'
        ? `<tr><td>特別割引</td><td>リピーター割引(10%OFF)</td><td>${escapeHtml(document.getElementById('p-disc').innerText)}</td></tr>`
        : '';
    const optList = document.getElementById('p-opt-list').innerText;
    const opt = document.getElementById('p-opt').innerText;
    const total = document.getElementById('p-total').innerText;

    return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領収書兼ご精算書</title>
<style>
@page { size: A5 portrait; margin: 12mm; }
html, body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
body { padding: 0; }
.sheet { width: 100%; box-sizing: border-box; }
.header-info { text-align: center; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 10px; }
.header-title { font-size: 18pt; font-weight: bold; }
.date-row { text-align: right; margin: 10px 0 20px 0; font-size: 11pt; }
.message { margin: 20px 0; line-height: 1.8; font-size: 11pt; }
.print-table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 1px solid #000; font-size: 10.5pt; }
.print-table th, .print-table td { border: 1px solid #000; padding: 10px; text-align: left; vertical-align: top; }
.print-table th { background: #f2f2f2; }
.total-section { font-size: 18pt; font-weight: bold; text-align: center; margin: 35px 0; border: 2px solid #000; padding: 15px; }
.footer-info { text-align: right; margin-top: 60px; font-size: 10pt; line-height: 1.6; }
.action-bar { display: flex; justify-content: center; gap: 12px; padding: 14px 0 22px; }
.action-btn { padding: 12px 18px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; background: #2c3e50; color: #fff; }
.action-btn.secondary { background: #718096; }
@media print { .action-bar { display: none !important; } }
</style>
</head>
<body>
<div class="sheet">
    <div class="action-bar">
        <button class="action-btn" onclick="window.print()">この画面を印刷</button>
        <button class="action-btn secondary" onclick="window.close()">閉じる</button>
    </div>
    <div class="header-info"><div class="header-title">領収書兼ご精算書</div></div>
    <div class="date-row">日付：${escapeHtml(date)}</div>
    <p class="message">この度はHomieeをご利用いただき、誠にありがとうございます。<br>下記内容にて、正に領収いたしました。</p>
    <table class="print-table">
        <thead>
            <tr><th style="width: 25%;">項目</th><th style="width: 50%;">詳細</th><th style="width: 25%;">金額</th></tr>
        </thead>
        <tbody>
            <tr><td>ご利用期間</td><td style="font-size: 9pt;">${escapeHtml(timeDetail)}</td><td>-</td></tr>
            <tr><td>ご利用時間</td><td>${escapeHtml(duration)}</td><td>-</td></tr>
            <tr><td>基本利用料</td><td>単価 × ${escapeHtml(count)}名</td><td>${escapeHtml(usage)}</td></tr>
            ${discRow}
            <tr><td>オプション</td><td>${escapeHtml(optList)}</td><td>${escapeHtml(opt)}</td></tr>
        </tbody>
    </table>
    <div class="total-section">合計金額：${escapeHtml(total)} (税込)</div>
    <div class="footer-info">
        東京都中央区銀座7-15-18 銀ビル1階<br>
        TEL: 03-4400-2291<br>
        <strong>homiee (株式会社mommy daddy)</strong>
    </div>
</div>
</body>
</html>`;
}

function openPrintView() {
    calculate();
    const printWindow = window.open('', '_blank');
    if (!printWindow) {
        alert('別画面を開けませんでした。Safariのポップアップブロックを確認してください。');
        return;
    }
    printWindow.document.open();
    printWindow.document.write(buildPrintHtml());
    printWindow.document.close();
}

calculate();
</script>
</body>
</html>
